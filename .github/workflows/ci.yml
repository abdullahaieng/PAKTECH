name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AUTH_SECRET: ci-secret
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: password
          ADMIN_SECRET: ci-secret
          NEXT_PUBLIC_STORE_API: http://localhost:3000
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy-project.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy-project.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: dummy-id
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000:android:dummy
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-DUMMY
          FIRESTORE_ENABLED: false
